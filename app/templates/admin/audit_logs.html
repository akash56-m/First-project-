{% extends 'base.html' %}
{% block content %}
<h2>Audit Logs (Append-only view)</h2>
<div class="table-responsive">
<table class="table table-sm table-striped">
<thead><tr><th>Time</th><th>User</th><th>Role</th><th>Action</th><th>IP</th><th>Hash</th></tr></thead>
<tbody>
{% for log in logs %}
<tr>
  <td>{{ log.timestamp.strftime('%Y-%m-%d %H:%M') }}</td>
  <td>{{ log.username }}</td>
  <td>{{ log.role }}</td>
  <td>{{ log.action }}</td>
  <td>{{ log.ip_address }}</td>
  <td><code>{{ log.hash[:16] }}...</code></td>
</tr>
{% endfor %}
</tbody>
</table>
</div>
{% endblock %}
